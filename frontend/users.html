<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users — Snapix</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>
<div id="sidebar-root"></div>

<div class="main-content fade-in">
    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h1 class="page-title">User Management</h1>
            <p class="page-subtitle">Manage registered users and their accounts.</p>
        </div>
        <button class="btn-gold" data-bs-toggle="modal" data-bs-target="#userModal" onclick="openAddModal()">
            <i class="fas fa-user-plus"></i> Add User
        </button>
    </div>

    <!-- Stats -->
    <div class="row g-3 mb-4">
        <div class="col-sm-4">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div class="stat-label">Total Users</div>
                <div class="stat-value" id="totalUsers">—</div>
            </div>
        </div>
        <div class="col-sm-4">
            <div class="stat-card">
                <div class="stat-icon" style="background:rgba(46,204,113,.15);color:#2ECC71"><i class="fas fa-user-check"></i></div>
                <div class="stat-label">Active Users</div>
                <div class="stat-value" id="activeUsers">—</div>
            </div>
        </div>
        <div class="col-sm-4">
            <div class="stat-card">
                <div class="stat-icon" style="background:rgba(231,76,60,.15);color:#E74C3C"><i class="fas fa-user-slash"></i></div>
                <div class="stat-label">Inactive Users</div>
                <div class="stat-value" id="inactiveUsers">—</div>
            </div>
        </div>
    </div>

    <!-- Search -->
    <div class="card-dark mb-4">
        <div class="row g-3 align-items-end">
            <div class="col-md-5">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" class="form-control-dark" id="searchInput" placeholder="Search by name or email..." oninput="applyFilter()">
                </div>
            </div>
            <div class="col-md-3">
                <select class="form-control-dark" id="statusFilter" onchange="applyFilter()">
                    <option value="">All Users</option>
                    <option value="true">Active</option>
                    <option value="false">Inactive</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn-ghost w-100" onclick="clearFilters()"><i class="fas fa-times"></i> Clear</button>
            </div>
        </div>
    </div>

    <!-- Table -->
    <div class="card-dark">
        <div class="table-responsive">
            <table class="table-dark-custom">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Role</th>
                        <th>Joined</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr><td colspan="7"><div class="empty-state"><div class="spinner-gold mx-auto"></div></div></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- User Modal -->
<div class="modal fade modal-dark" id="userModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="userModalTitle"><i class="fas fa-user-plus me-2" style="color:#D4A017"></i> Add User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="userId">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label-dark">Full Name *</label>
                        <input type="text" id="userName" class="form-control-dark" placeholder="John Smith">
                    </div>
                    <div class="col-12">
                        <label class="form-label-dark">Email *</label>
                        <input type="email" id="userEmail" class="form-control-dark" placeholder="john@example.com">
                    </div>
                    <div class="col-12" id="passwordField">
                        <label class="form-label-dark">Password *</label>
                        <input type="password" id="userPassword" class="form-control-dark" placeholder="Min. 6 characters">
                    </div>
                    <div class="col-12">
                        <label class="form-label-dark">Phone</label>
                        <input type="text" id="userPhone" class="form-control-dark" placeholder="+94 77 123 4567">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-ghost" data-bs-dismiss="modal">Cancel</button>
                <button class="btn-gold" id="userSaveBtn" onclick="saveUser()"><i class="fas fa-save"></i> Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/sidebar.js"></script>
<script>
initPage('users');

let allUsers = [];

async function loadUsers() {
    try {
        allUsers = await API.users.getAll();
        const active   = allUsers.filter(u => u.isActive).length;
        const inactive = allUsers.length - active;
        document.getElementById('totalUsers').textContent    = allUsers.length;
        document.getElementById('activeUsers').textContent   = active;
        document.getElementById('inactiveUsers').textContent = inactive;
        applyFilter();
    } catch(e) { Toast.error('Failed to load users'); }
}

function applyFilter() {
    const q      = document.getElementById('searchInput').value.toLowerCase();
    const status = document.getElementById('statusFilter').value;
    let list = [...allUsers];
    if (q)      list = list.filter(u => u.fullName.toLowerCase().includes(q) || u.email.toLowerCase().includes(q));
    if (status) list = list.filter(u => String(u.isActive) === status);
    renderTable(list);
}

function clearFilters() {
    document.getElementById('searchInput').value = '';
    document.getElementById('statusFilter').value = '';
    applyFilter();
}

function renderTable(list) {
    if (!list.length) {
        document.getElementById('usersTableBody').innerHTML = '<tr><td colspan="7"><div class="empty-state"><i class="fas fa-users"></i><h5>No users found</h5></div></td></tr>';
        return;
    }
    document.getElementById('usersTableBody').innerHTML = list.map(u => `
        <tr>
            <td>
                <div style="display:flex;align-items:center;gap:10px">
                    ${Utils.avatarHtml(u.fullName, 34)}
                    <div style="font-weight:600;color:#F0F0F0;font-size:.875rem">${u.fullName}</div>
                </div>
            </td>
            <td style="font-size:.875rem">${u.email}</td>
            <td style="color:#888;font-size:.875rem">${u.phone || '—'}</td>
            <td><span class="badge-status badge-gold" style="font-size:.65rem">${u.role}</span></td>
            <td style="font-size:.8rem;color:#666">${Utils.formatDate(u.createdAt)}</td>
            <td>${Utils.activeBadge(u.isActive)}</td>
            <td>
                <div style="display:flex;gap:6px">
                    <button class="btn-ghost" style="padding:5px 10px;font-size:.75rem" onclick="openEditModal(${u.id})" title="Edit">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="btn-ghost" style="padding:5px 10px;font-size:.75rem" onclick="toggleStatus(${u.id})" title="Toggle Status">
                        <i class="fas fa-toggle-${u.isActive ? 'on' : 'off'}" style="color:${u.isActive ? '#2ECC71' : '#666'}"></i>
                    </button>
                    <button class="btn-danger-ghost" style="padding:5px 10px;font-size:.75rem" onclick="deleteUser(${u.id})" title="Delete Permanently">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            </td>
        </tr>`).join('');
}

function openAddModal() {
    document.getElementById('userModalTitle').innerHTML = '<i class="fas fa-user-plus me-2" style="color:#D4A017"></i> Add User';
    document.getElementById('userId').value = '';
    ['userName','userEmail','userPassword','userPhone'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('passwordField').style.display = 'block';
}

function openEditModal(id) {
    const u = allUsers.find(x => x.id === id);
    if (!u) return;
    document.getElementById('userModalTitle').innerHTML = '<i class="fas fa-edit me-2" style="color:#D4A017"></i> Edit User';
    document.getElementById('userId').value    = u.id;
    document.getElementById('userName').value  = u.fullName;
    document.getElementById('userEmail').value = u.email;
    document.getElementById('userPhone').value = u.phone || '';
    document.getElementById('passwordField').style.display = 'none';
    new bootstrap.Modal(document.getElementById('userModal')).show();
}

async function saveUser() {
    const name  = document.getElementById('userName').value.trim();
    const email = document.getElementById('userEmail').value.trim();
    const phone = document.getElementById('userPhone').value.trim();
    const pw    = document.getElementById('userPassword').value;
    const id    = document.getElementById('userId').value;

    if (!name || !email) { Toast.warning('Name and email are required'); return; }
    if (!id && !pw)      { Toast.warning('Password is required for new users'); return; }

    const btn = document.getElementById('userSaveBtn');
    btn.disabled = true; btn.innerHTML = '<div class="spinner-gold" style="width:16px;height:16px"></div>';

    try {
        if (id) {
            const updated = await API.users.update(id, { fullName: name, email, phone, password: pw || 'placeholder' });
            Toast.success('User updated!');

            // If updating current user, refresh session
            const currentUser = Auth.getUser();
            if (currentUser && currentUser.id == id && currentUser.role === 'USER') {
                currentUser.fullName = updated.fullName;
                currentUser.email = updated.email;
                localStorage.setItem('pb_user', JSON.stringify(currentUser));
                // Refresh sidebar UI
                const sidebarRoot = document.getElementById('sidebar-root');
                if (sidebarRoot) sidebarRoot.innerHTML = renderSidebar('users');
            }
        } else {
            await API.users.create({ fullName: name, email, password: pw, phone });
            Toast.success('User created!');
        }
        bootstrap.Modal.getInstance(document.getElementById('userModal'))?.hide();
        await loadUsers();
    } catch(e) { Toast.error(e.message || 'Failed to save user'); }
    finally { btn.disabled = false; btn.innerHTML = '<i class="fas fa-save"></i> Save'; }
}

async function toggleStatus(id) {
    try {
        await API.users.toggle(id);
        const u = allUsers.find(x => x.id === id);
        Toast.info(`${u?.fullName} is now ${u?.isActive ? 'inactive' : 'active'}`);
        await loadUsers();
    } catch(e) { Toast.error(e.message); }
}

async function deleteUser(id) {
    const u = allUsers.find(x => x.id === id);
    if (!await Utils.confirmDialog(`Permanently delete user "${u?.fullName}"? This action cannot be undone.`)) return;
    try {
        await API.users.delete(id);
        Toast.success('User deleted permanently');
        await loadUsers();
    } catch(e) { Toast.error(e.message); }
}

loadUsers();
</script>
</body>
</html>
