<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Staff — LuminaShot</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
<style>
.staff-grid-card { background:#1e1e1e; border:1px solid #2a2a2a; border-radius:14px; padding:20px; transition:all .2s; }
.staff-grid-card:hover { border-color:rgba(212,160,23,.4); transform:translateY(-2px); }
.price-pill { display:inline-flex; align-items:center; background:rgba(212,160,23,.1); color:#D4A017; border:1px solid rgba(212,160,23,.2); border-radius:20px; padding:4px 12px; font-size:.8rem; font-weight:700; }
</style>
</head>
<body>
<div id="sidebar-root"></div>

<div class="main-content fade-in">
    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h1 class="page-title">Media Gallery</h1>
            <p class="page-subtitle">Manage photographers and videographers.</p>
        </div>
        <button class="btn-gold" data-bs-toggle="modal" data-bs-target="#staffModal" onclick="openAddModal()">
            <i class="fas fa-plus"></i> Add Staff
        </button>
    </div>

    <!-- Stats Row -->
    <div class="row g-3 mb-4">
        <div class="col-sm-4">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div class="stat-label">Total Staff</div>
                <div class="stat-value" id="totalStaff">—</div>
            </div>
        </div>
        <div class="col-sm-4">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-camera"></i></div>
                <div class="stat-label">Photographers</div>
                <div class="stat-value" id="totalPhoto">—</div>
            </div>
        </div>
        <div class="col-sm-4">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-video"></i></div>
                <div class="stat-label">Videographers</div>
                <div class="stat-value" id="totalVideo">—</div>
            </div>
        </div>
    </div>

    <!-- Filters -->
    <div class="card-dark mb-4">
        <div class="row g-3 align-items-end">
            <div class="col-md-4">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" class="form-control-dark" id="searchInput" placeholder="Search by name, specialization..." oninput="applyFilter()">
                </div>
            </div>
            <div class="col-md-3">
                <select class="form-control-dark" id="typeFilter" onchange="applyFilter()">
                    <option value="">All Types</option>
                    <option value="PHOTOGRAPHER">Photographers</option>
                    <option value="VIDEOGRAPHER">Videographers</option>
                </select>
            </div>
            <div class="col-md-3">
                <select class="form-control-dark" id="availFilter" onchange="applyFilter()">
                    <option value="">All Availability</option>
                    <option value="true">Available</option>
                    <option value="false">Unavailable</option>
                </select>
            </div>
            <div class="col-md-2">
                <div style="display:flex;gap:8px">
                    <button class="btn-ghost" id="viewGrid" onclick="setView('grid')" title="Grid"><i class="fas fa-th-large"></i></button>
                    <button class="btn-ghost" id="viewList" onclick="setView('list')" title="List"><i class="fas fa-list"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="staffContainer">
        <div class="empty-state"><div class="spinner-gold mx-auto"></div></div>
    </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal fade modal-dark" id="staffModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="staffModalTitle"><i class="fas fa-camera me-2" style="color:#D4A017"></i> Add Staff Member</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="staffId">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label-dark">Full Name *</label>
                        <input type="text" id="staffName" class="form-control-dark" placeholder="Elena Rostova">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-dark">Staff Type *</label>
                        <select id="staffType" class="form-control-dark">
                            <option value="PHOTOGRAPHER">Photographer</option>
                            <option value="VIDEOGRAPHER">Videographer</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-dark">Specialization</label>
                        <input type="text" id="staffSpec" class="form-control-dark" placeholder="Wedding, Portrait, Drone...">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-dark">Price Per Day ($) *</label>
                        <input type="number" id="staffPrice" class="form-control-dark" placeholder="500" min="0">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-dark">Availability Schedule</label>
                        <input type="text" id="staffAvail" class="form-control-dark" placeholder="Weekdays, Weekends...">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-dark">Contact Info</label>
                        <input type="text" id="staffContact" class="form-control-dark" placeholder="Phone or Email">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-ghost" data-bs-dismiss="modal">Cancel</button>
                <button class="btn-gold" id="staffSaveBtn" onclick="saveStaff()"><i class="fas fa-save"></i> Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/sidebar.js"></script>
<script>
initPage('staff');

let allStaff = [];
let currentView = 'grid';

async function loadStaff() {
    try {
        allStaff = await API.staff.getAll();
        const photo = allStaff.filter(s => s.type === 'PHOTOGRAPHER').length;
        const video = allStaff.filter(s => s.type === 'VIDEOGRAPHER').length;
        document.getElementById('totalStaff').textContent = allStaff.length;
        document.getElementById('totalPhoto').textContent = photo;
        document.getElementById('totalVideo').textContent = video;
        applyFilter();
    } catch(e) { Toast.error('Failed to load staff'); }
}

function setView(v) {
    currentView = v;
    document.getElementById('viewGrid').style.background = v === 'grid' ? 'rgba(212,160,23,.15)' : '';
    document.getElementById('viewList').style.background = v === 'list' ? 'rgba(212,160,23,.15)' : '';
    applyFilter();
}

function applyFilter() {
    const q     = document.getElementById('searchInput').value.toLowerCase();
    const type  = document.getElementById('typeFilter').value;
    const avail = document.getElementById('availFilter').value;

    let list = [...allStaff];
    if (q)     list = list.filter(s => s.name.toLowerCase().includes(q) || (s.specialization||'').toLowerCase().includes(q));
    if (type)  list = list.filter(s => s.type === type);
    if (avail) list = list.filter(s => String(s.isAvailable) === avail);

    renderStaff(list);
}

function renderStaff(list) {
    if (!list.length) {
        document.getElementById('staffContainer').innerHTML = `<div class="empty-state"><i class="fas fa-camera"></i><h5>No staff found</h5><p>Try adjusting your filters or add new staff</p></div>`;
        return;
    }

    if (currentView === 'grid') {
        document.getElementById('staffContainer').innerHTML = `
            <div class="row g-3">${list.map(s => `
            <div class="col-md-4 col-sm-6">
                <div class="staff-grid-card">
                    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
                        ${Utils.avatarHtml(s.name, 48)}
                        <div>
                            <div style="font-weight:700;color:#F0F0F0;font-size:.95rem">${s.name}</div>
                            <span class="badge-status ${s.type==='PHOTOGRAPHER'?'badge-gold':'badge-completed'}" style="font-size:.65rem;margin-top:2px">
                                <i class="fas ${s.type==='PHOTOGRAPHER'?'fa-camera':'fa-video'}" style="font-size:.55rem"></i> ${s.type}
                            </span>
                        </div>
                    </div>
                    ${s.specialization ? `<div style="font-size:.8rem;color:#666;margin-bottom:10px"><i class="fas fa-tag me-1" style="color:#D4A017;font-size:.7rem"></i>${s.specialization}</div>` : ''}
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                        <span class="price-pill">$${s.pricePerDay}/day</span>
                        ${Utils.activeBadge(s.isAvailable)}
                    </div>
                    ${s.availability ? `<div style="font-size:.75rem;color:#555;margin-bottom:12px"><i class="fas fa-calendar me-1"></i>${s.availability}</div>` : ''}
                    <div style="display:flex;gap:6px">
                        <button class="btn-outline-gold" style="flex:1;justify-content:center;font-size:.78rem" onclick="openEditModal(${s.id})"><i class="fas fa-edit"></i> Edit</button>
                        <button class="btn-ghost" style="padding:8px 10px;font-size:.78rem" onclick="toggleAvail(${s.id})" title="Toggle availability">
                            <i class="fas ${s.isAvailable ? 'fa-eye-slash' : 'fa-eye'}"></i>
                        </button>
                        <button class="btn-danger-ghost" style="padding:8px 10px" onclick="deleteStaff(${s.id})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            </div>`).join('')}</div>`;
    } else {
        document.getElementById('staffContainer').innerHTML = `
            <div class="card-dark">
                <table class="table-dark-custom">
                    <thead><tr>
                        <th>Staff Member</th><th>Type</th><th>Specialization</th>
                        <th>Price/Day</th><th>Availability</th><th>Status</th><th>Actions</th>
                    </tr></thead>
                    <tbody>${list.map(s => `
                    <tr>
                        <td>
                            <div style="display:flex;align-items:center;gap:10px">
                                ${Utils.avatarHtml(s.name, 32)}
                                <div>
                                    <div style="font-weight:600;color:#F0F0F0;font-size:.875rem">${s.name}</div>
                                    <div style="font-size:.72rem;color:#555">${s.contactInfo||'—'}</div>
                                </div>
                            </div>
                        </td>
                        <td><span class="badge-status ${s.type==='PHOTOGRAPHER'?'badge-gold':'badge-completed'}" style="font-size:.65rem">${s.type}</span></td>
                        <td>${s.specialization||'—'}</td>
                        <td style="color:#D4A017;font-weight:700">$${s.pricePerDay}</td>
                        <td style="font-size:.8rem;color:#888">${s.availability||'—'}</td>
                        <td>${Utils.activeBadge(s.isAvailable)}</td>
                        <td>
                            <div style="display:flex;gap:6px">
                                <button class="btn-ghost" style="padding:5px 10px;font-size:.75rem" onclick="openEditModal(${s.id})"><i class="fas fa-edit"></i></button>
                                <button class="btn-ghost" style="padding:5px 10px;font-size:.75rem" onclick="toggleAvail(${s.id})"><i class="fas fa-toggle-${s.isAvailable?'on':'off'}"></i></button>
                                <button class="btn-danger-ghost" style="padding:5px 10px" onclick="deleteStaff(${s.id})"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>`).join('')}</tbody>
                </table>
            </div>`;
    }
}

function openAddModal() {
    document.getElementById('staffModalTitle').innerHTML = '<i class="fas fa-plus me-2" style="color:#D4A017"></i> Add Staff Member';
    document.getElementById('staffId').value = '';
    ['staffName','staffSpec','staffAvail','staffContact'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('staffType').value = 'PHOTOGRAPHER';
    document.getElementById('staffPrice').value = '';
}

function openEditModal(id) {
    const s = allStaff.find(x => x.id === id);
    if (!s) return;
    document.getElementById('staffModalTitle').innerHTML = '<i class="fas fa-edit me-2" style="color:#D4A017"></i> Edit Staff Member';
    document.getElementById('staffId').value      = s.id;
    document.getElementById('staffName').value    = s.name;
    document.getElementById('staffType').value    = s.type;
    document.getElementById('staffSpec').value    = s.specialization || '';
    document.getElementById('staffPrice').value   = s.pricePerDay;
    document.getElementById('staffAvail').value   = s.availability || '';
    document.getElementById('staffContact').value = s.contactInfo || '';
    new bootstrap.Modal(document.getElementById('staffModal')).show();
}

async function saveStaff() {
    const name  = document.getElementById('staffName').value.trim();
    const price = parseFloat(document.getElementById('staffPrice').value);
    if (!name || !price) { Toast.warning('Name and price are required'); return; }

    const body = {
        name, price, type: document.getElementById('staffType').value,
        specialization: document.getElementById('staffSpec').value,
        pricePerDay: price,
        availability: document.getElementById('staffAvail').value,
        contactInfo: document.getElementById('staffContact').value
    };

    const btn = document.getElementById('staffSaveBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner-gold" style="width:16px;height:16px"></div>';

    try {
        const id = document.getElementById('staffId').value;
        if (id) {
            await API.staff.update(id, body);
            Toast.success('Staff updated successfully');
        } else {
            await API.staff.create(body);
            Toast.success('Staff member added!');
        }
        bootstrap.Modal.getInstance(document.getElementById('staffModal'))?.hide();
        await loadStaff();
    } catch(e) { Toast.error(e.message || 'Failed to save'); }
    finally { btn.disabled = false; btn.innerHTML = '<i class="fas fa-save"></i> Save'; }
}

async function toggleAvail(id) {
    try {
        await API.staff.toggle(id);
        const s = allStaff.find(x => x.id === id);
        Toast.info(`${s?.name} is now ${s?.isAvailable ? 'unavailable' : 'available'}`);
        await loadStaff();
    } catch(e) { Toast.error(e.message); }
}

async function deleteStaff(id) {
    const s = allStaff.find(x => x.id === id);
    if (!await Utils.confirmDialog(`Remove ${s?.name}? This cannot be undone.`)) return;
    try {
        await API.staff.delete(id);
        Toast.success('Staff member removed');
        await loadStaff();
    } catch(e) { Toast.error(e.message); }
}

loadStaff();
</script>
</body>
</html>
