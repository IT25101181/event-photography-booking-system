<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reviews — LuminaShot</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
<style>
.review-card { background:#1e1e1e; border:1px solid #2a2a2a; border-radius:14px; padding:20px; transition:all .2s; }
.review-card:hover { border-color:rgba(212,160,23,.3); }
.star-input { display:flex; gap:4px; }
.star-input i { font-size:1.5rem; color:#333; cursor:pointer; transition:color .15s; }
.star-input i.active { color:#D4A017; }
.star-input i:hover, .star-input i.hover { color:#D4A017; }
.avg-display { font-size:3rem; font-weight:900; color:#D4A017; line-height:1; }
</style>
</head>
<body>
<div id="sidebar-root"></div>

<div class="main-content fade-in">
    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h1 class="page-title">Reviews &amp; Ratings</h1>
            <p class="page-subtitle">Client feedback and staff performance ratings.</p>
        </div>
        <button class="btn-gold" data-bs-toggle="modal" data-bs-target="#reviewModal" onclick="openAddModal()">
            <i class="fas fa-star"></i> Write Review
        </button>
    </div>

    <!-- Stats -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-comments"></i></div>
                <div class="stat-label">Total Reviews</div>
                <div class="stat-value" id="totalReviews">—</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-star"></i></div>
                <div class="stat-label">Average Rating</div>
                <div class="stat-value" id="avgRating">—</div>
                <div class="stat-sub">Out of 5.0</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-thumbs-up"></i></div>
                <div class="stat-label">5 Star Reviews</div>
                <div class="stat-value" id="fiveStarCount">—</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-user-check"></i></div>
                <div class="stat-label">Staff Reviewed</div>
                <div class="stat-value" id="staffReviewed">—</div>
            </div>
        </div>
    </div>

    <!-- Filters -->
    <div class="card-dark mb-4">
        <div class="row g-3 align-items-end">
            <div class="col-md-4">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" class="form-control-dark" id="searchInput" placeholder="Search comments..." oninput="applyFilter()">
                </div>
            </div>
            <div class="col-md-3">
                <select class="form-control-dark" id="ratingFilter" onchange="applyFilter()">
                    <option value="">All Ratings</option>
                    <option value="5">★★★★★ 5 Stars</option>
                    <option value="4">★★★★ 4 Stars</option>
                    <option value="3">★★★ 3 Stars</option>
                    <option value="2">★★ 2 Stars</option>
                    <option value="1">★ 1 Star</option>
                </select>
            </div>
            <div class="col-md-3">
                <input type="text" class="form-control-dark" id="staffIdFilter" placeholder="Filter by Staff ID..." oninput="applyFilter()">
            </div>
            <div class="col-md-2">
                <button class="btn-ghost w-100" onclick="clearFilters()"><i class="fas fa-times"></i> Clear</button>
            </div>
        </div>
    </div>

    <!-- Rating distribution -->
    <div class="card-dark mb-4" id="ratingDistribution"></div>

    <!-- Reviews list -->
    <div id="reviewsContainer">
        <div class="empty-state"><div class="spinner-gold mx-auto"></div></div>
    </div>
</div>

<!-- Add/Edit Review Modal -->
<div class="modal fade modal-dark" id="reviewModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="reviewModalTitle"><i class="fas fa-star me-2" style="color:#D4A017"></i> Write a Review</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="reviewId">
                <div class="mb-3">
                    <label class="form-label-dark">User ID *</label>
                    <input type="number" id="rvUserId" class="form-control-dark" placeholder="1">
                </div>
                <div class="mb-3">
                    <label class="form-label-dark">Staff ID *</label>
                    <input type="number" id="rvStaffId" class="form-control-dark" placeholder="1">
                </div>
                <div class="mb-3">
                    <label class="form-label-dark">Booking ID *</label>
                    <input type="number" id="rvBookingId" class="form-control-dark" placeholder="1">
                </div>
                <div class="mb-3">
                    <label class="form-label-dark">Your Rating *</label>
                    <div class="star-input" id="starInput">
                        <i class="fas fa-star" data-val="1" onclick="setRating(1)" onmouseenter="hoverStars(1)" onmouseleave="resetStars()"></i>
                        <i class="fas fa-star" data-val="2" onclick="setRating(2)" onmouseenter="hoverStars(2)" onmouseleave="resetStars()"></i>
                        <i class="fas fa-star" data-val="3" onclick="setRating(3)" onmouseenter="hoverStars(3)" onmouseleave="resetStars()"></i>
                        <i class="fas fa-star" data-val="4" onclick="setRating(4)" onmouseenter="hoverStars(4)" onmouseleave="resetStars()"></i>
                        <i class="fas fa-star" data-val="5" onclick="setRating(5)" onmouseenter="hoverStars(5)" onmouseleave="resetStars()"></i>
                    </div>
                    <input type="hidden" id="rvRating" value="0">
                </div>
                <div class="mb-3">
                    <label class="form-label-dark">Your Review *</label>
                    <textarea id="rvComment" class="form-control-dark" rows="4" placeholder="Share your experience..." style="resize:vertical"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-ghost" data-bs-dismiss="modal">Cancel</button>
                <button class="btn-gold" id="reviewSaveBtn" onclick="saveReview()"><i class="fas fa-paper-plane"></i> Submit Review</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/sidebar.js"></script>
<script>
initPage('reviews');

let allReviews = [];

async function loadReviews() {
    try {
        allReviews = await API.reviews.getAll();
        updateStats();
        renderDistribution();
        applyFilter();
    } catch(e) { Toast.error('Failed to load reviews'); }
}

function updateStats() {
    const total = allReviews.length;
    const avg   = total ? (allReviews.reduce((s, r) => s + r.rating, 0) / total).toFixed(1) : '—';
    const five  = allReviews.filter(r => r.rating === 5).length;
    const staffSet = new Set(allReviews.map(r => r.staffId)).size;

    document.getElementById('totalReviews').textContent  = total;
    document.getElementById('avgRating').textContent     = avg;
    document.getElementById('fiveStarCount').textContent = five;
    document.getElementById('staffReviewed').textContent = staffSet;
}

function renderDistribution() {
    if (!allReviews.length) { document.getElementById('ratingDistribution').innerHTML = ''; return; }
    const counts = [5,4,3,2,1].map(n => ({ rating: n, count: allReviews.filter(r => r.rating === n).length }));
    const max = Math.max(...counts.map(c => c.count), 1);
    const avg = (allReviews.reduce((s, r) => s + r.rating, 0) / allReviews.length).toFixed(1);

    document.getElementById('ratingDistribution').innerHTML = `
        <div style="display:flex;gap:32px;align-items:center">
            <div style="text-align:center;min-width:100px">
                <div class="avg-display">${avg}</div>
                <div>${Utils.stars(Math.round(parseFloat(avg)))}</div>
                <div style="font-size:.75rem;color:#666;margin-top:4px">${allReviews.length} reviews</div>
            </div>
            <div style="flex:1">
                ${counts.map(c => `
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
                    <div style="font-size:.8rem;color:#888;width:20px;text-align:right">${c.rating}</div>
                    <i class="fas fa-star" style="color:#D4A017;font-size:.75rem;flex-shrink:0"></i>
                    <div style="flex:1;height:8px;background:#1a1a1a;border-radius:4px;overflow:hidden">
                        <div style="width:${(c.count/max*100)}%;height:100%;background:#D4A017;border-radius:4px;transition:width .4s"></div>
                    </div>
                    <div style="font-size:.8rem;color:#666;width:24px;text-align:left">${c.count}</div>
                </div>`).join('')}
            </div>
        </div>`;
}

function applyFilter() {
    const q      = document.getElementById('searchInput').value.toLowerCase();
    const rating = parseInt(document.getElementById('ratingFilter').value) || 0;
    const staffId= document.getElementById('staffIdFilter').value;

    let list = [...allReviews];
    if (q)       list = list.filter(r => r.comment.toLowerCase().includes(q));
    if (rating)  list = list.filter(r => r.rating === rating);
    if (staffId) list = list.filter(r => String(r.staffId) === staffId);

    renderReviews(list);
}

function clearFilters() {
    document.getElementById('searchInput').value = '';
    document.getElementById('ratingFilter').value = '';
    document.getElementById('staffIdFilter').value = '';
    applyFilter();
}

function renderReviews(list) {
    if (!list.length) {
        document.getElementById('reviewsContainer').innerHTML = `<div class="empty-state"><i class="fas fa-star"></i><h5>No reviews found</h5><p>Be the first to write a review</p><button class="btn-gold mt-3" data-bs-toggle="modal" data-bs-target="#reviewModal" onclick="openAddModal()"><i class="fas fa-star"></i> Write Review</button></div>`;
        return;
    }
    document.getElementById('reviewsContainer').innerHTML = `
        <div class="row g-3">${list.map(r => `
        <div class="col-md-6 col-lg-4">
            <div class="review-card">
                <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:12px">
                    <div style="display:flex;align-items:center;gap:10px">
                        ${Utils.avatarHtml('User ' + r.userId, 36)}
                        <div>
                            <div style="font-weight:700;font-size:.875rem;color:#F0F0F0">User #${r.userId}</div>
                            <div style="font-size:.72rem;color:#555">Staff #${r.staffId}</div>
                        </div>
                    </div>
                    <div style="display:flex;gap:4px">
                        <button class="btn-ghost" style="padding:4px 8px;font-size:.72rem" onclick="openEditModal(${r.id})"><i class="fas fa-edit"></i></button>
                        <button class="btn-danger-ghost" style="padding:4px 8px" onclick="deleteReview(${r.id})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
                <div style="margin-bottom:10px">${Utils.stars(r.rating)}</div>
                <p style="font-size:.875rem;color:#A0A0A0;line-height:1.6;margin-bottom:12px">"${r.comment}"</p>
                <div style="display:flex;justify-content:space-between;align-items:center">
                    <span class="badge-status badge-gold" style="font-size:.65rem">Booking #${r.bookingId}</span>
                    <span style="font-size:.72rem;color:#555">${Utils.formatDate(r.reviewDate)}</span>
                </div>
            </div>
        </div>`).join('')}</div>`;
}

// Star rating interaction
let selectedRating = 0;
function setRating(n) {
    selectedRating = n;
    document.getElementById('rvRating').value = n;
    updateStarDisplay(n);
}
function hoverStars(n) { updateStarDisplay(n); }
function resetStars()  { updateStarDisplay(selectedRating); }
function updateStarDisplay(n) {
    document.querySelectorAll('#starInput i').forEach((star, i) => {
        star.style.color = i < n ? '#D4A017' : '#333';
    });
}

function openAddModal() {
    document.getElementById('reviewModalTitle').innerHTML = '<i class="fas fa-star me-2" style="color:#D4A017"></i> Write a Review';
    document.getElementById('reviewId').value = '';
    ['rvUserId','rvStaffId','rvBookingId','rvComment'].forEach(id => document.getElementById(id).value = '');
    selectedRating = 0;
    document.getElementById('rvRating').value = 0;
    updateStarDisplay(0);
}

function openEditModal(id) {
    const r = allReviews.find(x => x.id === id);
    if (!r) return;
    document.getElementById('reviewModalTitle').innerHTML = '<i class="fas fa-edit me-2" style="color:#D4A017"></i> Edit Review';
    document.getElementById('reviewId').value    = r.id;
    document.getElementById('rvUserId').value    = r.userId;
    document.getElementById('rvStaffId').value   = r.staffId;
    document.getElementById('rvBookingId').value = r.bookingId;
    document.getElementById('rvComment').value   = r.comment;
    selectedRating = r.rating;
    document.getElementById('rvRating').value = r.rating;
    updateStarDisplay(r.rating);
    new bootstrap.Modal(document.getElementById('reviewModal')).show();
}

async function saveReview() {
    const rating  = parseInt(document.getElementById('rvRating').value);
    const comment = document.getElementById('rvComment').value.trim();
    if (!rating)   { Toast.warning('Please select a rating'); return; }
    if (!comment)  { Toast.warning('Please write a comment'); return; }

    const body = {
        userId:    parseInt(document.getElementById('rvUserId').value),
        staffId:   parseInt(document.getElementById('rvStaffId').value),
        bookingId: parseInt(document.getElementById('rvBookingId').value),
        rating, comment
    };

    const btn = document.getElementById('reviewSaveBtn');
    btn.disabled = true; btn.innerHTML = '<div class="spinner-gold" style="width:16px;height:16px"></div>';

    try {
        const id = document.getElementById('reviewId').value;
        if (id) { await API.reviews.update(id, body); Toast.success('Review updated!'); }
        else    { await API.reviews.create(body);     Toast.success('Review submitted! ⭐'); }
        bootstrap.Modal.getInstance(document.getElementById('reviewModal'))?.hide();
        await loadReviews();
    } catch(e) { Toast.error(e.message || 'Failed to save review'); }
    finally { btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Review'; }
}

async function deleteReview(id) {
    if (!await Utils.confirmDialog(`Delete this review?`)) return;
    try {
        await API.reviews.delete(id);
        Toast.success('Review deleted');
        await loadReviews();
    } catch(e) { Toast.error(e.message); }
}

loadReviews();
</script>
</body>
</html>
